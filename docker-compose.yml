services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
      - umami
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8080"
    env_file: .env
    volumes:
      - manifest-data:/app/stories
    depends_on:
      - umami
    restart: unless-stopped

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASS}@db:5432/umami
      APP_SECRET: ${UMAMI_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASS}
    volumes:
      - umami-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  manifest-data:
  umami-db:
  caddy-data:
  caddy-config:
